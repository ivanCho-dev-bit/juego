<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego 💘</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#ff9a9e, #fad0c4);
    text-align: center;
    color: white;
  }

  h1 {
    margin-top: 20px;
  }

  #gameArea {
    position: relative;
    width: 100%;
    height: 70vh;
  }

  #heart {
    position: absolute;
    font-size: 40px;
    cursor: pointer;
    transition: 0.01
  s;
  }

  #message {
    font-size: 20px;
    margin-top: 20px;
  }

  button {
    padding: 10px 20px;
    border: none;
    background: white;
    color: #ff4b5c;
    border-radius: 10px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Juego 💘</h1>
<p>Atrapa el corazón antes de que se acabe el tiempo 😏</p>

<div id="gameArea">
  <div id="heart">❤️</div>
</div>

<p id="message"></p>
<button onclick="startGame()">Jugar</button>

<script>
let timeLeft;
let gameActive = false;

function moveHeart() {
  if (!gameActive) return;

  const heart = document.getElementById("heart");
  const area = document.getElementById("gameArea");

  const x = Math.random() * (area.clientWidth - 50);
  const y = Math.random() * (area.clientHeight - 50);

  heart.style.left = x + "px";
  heart.style.top = y + "px";
}

function startGame() {
  document.getElementById("message").textContent = "";
  gameActive = true;
  timeLeft = 5;

  const interval = setInterval(() => {
    moveHeart();
    timeLeft--;

    if (timeLeft <= 0) {
      clearInterval(interval);
      if (gameActive) {
        loseGame();
      }
    }
  }, 800);
}

document.getElementById("heart").onclick = function () {
  if (gameActive) {
    gameActive = false;
    winGame();
  }
};

function winGame() {
  document.getElementById("message").textContent =
    "💖 Ganaste 💖 Eres lo mejor que me ha pasado, espero que logres todas tus metas, yo siempre voy a estar aqui para ti no importa que pase y lo que venga, solo quiero ser tu compañia hasta que la vida lo decida, es el ultimo año del colegio y me gustaria salir contigo, jugar, reirnos, disfrutar momentos que en un futuro seran lindos recuerdos, y no se si hayas sentido un recuerdito por ahi al leer esto, porque fue lo mismo que te dije hace mas de un año. Solo quiero crear lindos recuerdos, mostrarte mi amor, porque creeme que pase lo que me pase siempre me va a sobrar para ti. Es algo que tu te mereces mas que nadie, pero bueno que sepas que aqui estoy deseandote lo mejor. Y quiero que sepas que la vida y el tiempo me hiceron darme cuenta de algo muy importante y es que no es facil olvidar lo que se amo realmente. Es por eso que sigo amandote ahora, si no fuera sido por ese brocoli ahora mismo seguro fueramos amigos y ya,AJJAKJA GRACIAS BROCO-LEE. Ese dia me arrebate y queria comprarte cualquier cosa, incluso pense en llevarte flores a tu casa como el año pasado pero sentia que ya iba a ser como muy rarito. Pero bueno, atrapaste el corazon!! te amo mucho meu amor ❤️✨";
}

function loseGame() {
  document.getElementById("message").textContent =
    "😜 Perdiste... ¿enserio dejaste ir mi corazon? que nuv, intenta otra vez 😘";
}
</script>

</body>
</html>
